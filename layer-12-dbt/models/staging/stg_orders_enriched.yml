version: 2

models:
  - name: stg_orders_enriched
    description: "Cleaned orders — nulls filtered, types cast, status lowercased"
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: customer_name
        tests: [not_null]
      - name: total_amount
        tests: [not_null]
      - name: status
        tests:
          - accepted_values:
              values: ['pending', 'shipped', 'delivered']

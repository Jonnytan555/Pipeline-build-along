# GCP (GKE, europe-west2) overrides
replicaCount: 2

service:
  type: LoadBalancer

ingress:
  enabled: true
  host: api.pipeline.gcp.internal
  className: gce

config:
  awsRegion: ""
  s3RawBucket: ""           # replaced by GCS in actual GCP deploy
  s3ProcessedBucket: ""
  dbHost: "127.0.0.1"       # Cloud SQL via sidecar proxy
  dbName: "warehouse_db"
  logLevel: "INFO"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 12
  targetCPUUtilizationPercentage: 65

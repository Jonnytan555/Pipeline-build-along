name: pipeline
version: '1.0.0'
config-version: 2

profile: pipeline

model-paths: ["models"]
test-paths:  ["tests"]
macro-paths: ["macros"]

target-path:   "target"
clean-targets: ["target", "dbt_packages"]

models:
  pipeline:
    staging:
      +materialized: view       # staging = cheap views, recomputed on demand
      +schema: staging
    marts:
      +materialized: table      # marts = persisted tables, fast for BI/API
      +schema: marts

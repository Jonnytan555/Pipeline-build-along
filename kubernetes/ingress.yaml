apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pipeline-api
  namespace: pipeline
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: api.pipeline.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pipeline-api
                port:
                  number: 80
